name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: https://qurhxobzrymvwvpkzoee.supabase.co
          SUPABASE_KEY: sb_publishable_PWYseAgWd8nG7_dxRuF-Aw_aCRKknjf
        run: |
          status=$(curl -s -o /tmp/response.txt -w '%{http_code}' \
            "$SUPABASE_URL/rest/v1/score_submissions?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY")

          echo "HTTP status: $status"
          echo "Response body:"
          cat /tmp/response.txt

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Supabase keep-alive ping failed with status $status"
            exit 1
          fi
